name: Generate Image

on: [push]
permissions: { contents: write }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - name: Générer l'image et l'index HTML
        env:
          API_KEY: ${{ secrets.DYNAPICTURES_API_KEY }}
        run: |
          mkdir -p images
          MSG=$(git log -1 --pretty=%B)
          
          # 1. Génération et téléchargement via curl + jq
          URL=$(curl -s -X POST https://api.dynapictures.com/designs/2379038427 -H "Authorization: Bearer $API_KEY" -H "Content-Type: application/json" -d "{\"params\": [{\"name\": \"title\", \"text\": \"$MSG\"}]}" | jq -r '.imageUrl')
          curl -s "$URL" -o images/${{ github.sha }}.png
          
          # 2. Création rapide du fichier HTML
          echo "<h1>Galerie IA</h1>" > images/index.html
          for img in images/*.png; do echo "<p>$(basename $img)</p><img src='$(basename $img)' width='400'>" >> images/index.html; done

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./images

